services:
  api_host: "nomad-sadewasser.inl.local"
  api_base_path: "/nomad-oasis"
  admin_user_id: "2a497944-a042-45d1-9ec5-cd450c3d8950"
  upload_limit: 100

oasis:
  is_oasis: true
  uses_central_user_management: true
  allowed_users:
    - "diego.garzon@inl.int"
    - "garzondiegoinl" # username fallback: local user record has email=None
    - "sascha.sadewasser@inl.int"
    - "pedro.anacleto@inl.int"
    - "diogo.costa@inl.int"
    - "jose.fonseca@inl.int"
    - "nuno.rodrigues@inl.int"
    - "margarida.moura@inl.int"
    - "marina.alves@inl.int"
    - "joana.m.ribeiro@inl.int"
    - "andre.silva@inl.int"
    - "joao.p.oliveira@inl.int"
    - "gabriel.quartin@inl.int"
    - "pedro.sousa@inl.int"
    - "neha.kumari@inl.int"
    - "eduardo.lopez@inl.int"
    - "ines.cardoso@inl.int"

plugins:
  entry_points:
    options:
      nomad_north_jupyter.north_tools:jupyter:
        id_url_safe: north-jupyter
        north_tool:
          image: ghcr.io/garzondiegofeup/nomad-oasis-inl/jupyter:main
          display_name: INL Jupyter
          short_description: INL Jupyter Notebook server (with INL plugins pre-installed).

north:
  tools:
    # Hide the built-in default "Jupyter Notebook" tool (id: jupyter). It uses
    # the stock upstream image, which does NOT have our plugins (nomad-analysis,
    # nomad-inl-base, etc.) installed, and its display name is easily confused
    # with our custom "INL Jupyter" tool above. Use "INL Jupyter" instead.
    exclude:
      - jupyter

meta:
  deployment: "oasis"
  deployment_url: "https://nomad-sadewasser.inl.local/nomad-oasis/api"
  maintainer_email: "me@my-oasis.org"

logstash:
  enabled: false

temporal:
  enabled: true

mongo:
  db_name: nomad_oasis_v1

elastic:
  entries_index: nomad_oasis_entries_v1
  materials_index: nomad_oasis_materials_v1
